<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts/tableTracking.js" defer></script>
</head>
<body>
    <h1>Habit Tracker</h1>
    <table id="habitTable">
        <thead>
            <tr>
                <th>Habit</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
                <th>Saturday</th>
                <th>Sunday</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Exercise</td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
            </tr>
            <tr>
                <td>Read</td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
                <td class="track"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
